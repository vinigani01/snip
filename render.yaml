services:
  - type: web
    name: urlshort
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: BASE_URL
        sync: false          # you'll fill this in after first deploy
      - key: DATABASE_URL
        fromDatabase:
          name: urlshort-db
          property: connectionString

databases:
  - name: urlshort-db
    plan: free
    databaseName: urlshort
